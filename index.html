<!DOCTYPE html>

<html>
<head>
  <title>Tania Tarafdar</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- STYLE -->

  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- ================= NAVBAR ================= -->

<div class="nav">
  <div class="logo">Tania Tarafdar</div>
  <div class="menu">
    <a href="#work">Work</a>
    <a href="#contact">Contact</a>
  </div>
</div>

<!-- ================= HERO ================= -->

<div class="section hero">
  <!-- 🔴 EDIT ONLY IF FILE NAME DIFFERENT -->
  <img src="images/profile.png">

  <div class="hero-text">
    <h1 id="name"></h1>
    <h2 id="title"></h2>
    <p>
      Blending storytelling and analytics to scale brands across digital and print ecosystems
    </p>
  </div>
</div>

<!-- ================= METRICS ================= -->

<div class="section">
  <!-- 🔴 EDIT ONLY IF FILE NAME DIFFERENT -->
  <img src="images/metrics.jpg" class="metrics">
</div>

<!-- ================= WORK ================= -->

<div class="section" id="work">
  <h2>High Traffic / SEO Success</h2>
  <div class="work-grid" id="work-container"></div>
</div>

<!-- ================= CONTACT ================= -->

<div class="section contact" id="contact">
  <h2>Let’s Work Together</h2>
  <p id="email"></p>
</div>

<!-- DATA FILES -->

<script src="config.js"></script>

<script src="data.js"></script>

<!-- ================= SCRIPT ================= -->

<script>

// TEXT CONTENT
document.getElementById("name").innerText = CONFIG.name;
document.getElementById("title").innerText = CONFIG.title;
document.getElementById("email").innerText = CONFIG.email;

// WORK CARDS
const container = document.getElementById("work-container");

WORK.forEach(item => {

  const div = document.createElement("div");
  div.className = "work-card";

  div.innerHTML = `
    <a href="${item.link}" target="_blank">
      <img src="https://image.thum.io/get/${item.link}">
      <h3>${item.title}</h3>
      <p>${item.description}</p>
    </a>
  `;

  container.appendChild(div);

});

</script>

</body>
</html>
