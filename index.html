<!DOCTYPE html>
<html>
<head>
  <title>Tania Tarafdar</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="style.css">

</head>

<body>

<!-- HERO -->
<div class="section hero">
  <img src="/images/mai_head_shot-removebg-preview.png">

  <div class="hero-text">
    <h1 id="name"></h1>
    <h2 id="title"></h2>
    <p>Blending storytelling and analytics to scale brands across digital and print ecosystems</p>
  </div>
</div>

<!-- METRICS -->
<div class="section">
  <img src="images
/WhatsApp Image 2026-04-03 at 14.34.25.jpeg
" style="width:100%;">
</div>

<!-- SEO WORK -->
<div class="section">
  <h2>High Traffic / SEO Success</h2>
  <div class="work-grid" id="work"></div>
</div>

<!-- CONTACT -->
<div class="section">
  <h2>Let’s Work Together</h2>
  <p id="email"></p>
</div>

<script src="config.js"></script>
<script src="data.js"></script>

<script>

document.getElementById("name").innerText = CONFIG.name;
document.getElementById("title").innerText = CONFIG.title;
document.getElementById("email").innerText = CONFIG.email;

const container = document.getElementById("work");

WORK.forEach(item => {

  const div = document.createElement("div");
  div.className = "work-card";

  div.innerHTML = `
    <a href="${item.link}" target="_blank">
      <img src="https://image.thum.io/get/${item.link}">
      <h3>${item.title}</h3>
      <p>${item.description}</p>
    </a>
  `;

  container.appendChild(div);

});

</script>

</body>
</html>
